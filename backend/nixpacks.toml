[phases.setup]
nixPkgs = [
  "python3",
  "gcc",
  "libreoffice",
  "jre",
  "fontconfig",
  "pango",
  "cairo",
  "gdk-pixbuf",
  "shared-mime-info",
  "gobject-introspection",
  "libffi",
  "glib"
]

[env]
HOME = "/tmp"
LD_LIBRARY_PATH = "/nix/profile/lib:/app/.nix-profile/lib:/root/.nix-profile/lib"

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "mkdir -p ~/.local/share/fonts",
  "cp fonts/*.ttf ~/.local/share/fonts/ || true",
  "fc-cache -f -v",
  "soffice --headless --terminate_after_init --env:UserInstallation=file:///tmp/lo_profile_warmup || true",
  "ln -s /nix/profile/lib/libpango-1.0.so /nix/profile/lib/libpango-1.0-0 || true",
  "ln -s /nix/profile/lib/libpangocairo-1.0.so /nix/profile/lib/libpangocairo-1.0-0 || true"
]