[phases.setup]
nixPkgs = [
  "python3",
  "gcc",
  "libreoffice",
  "jre",
  "fontconfig",
  "gobject-introspection",
  "libffi",
  "glib"
]
aptPkgs = [
  "libpango-1.0-0",
  "libpangocairo-1.0-0",
  "libcairo2",
  "libgdk-pixbuf2.0-0",
  "shared-mime-info"
]

[env]
HOME = "/tmp"
LD_LIBRARY_PATH = "/nix/profile/lib:/app/.nix-profile/lib:/root/.nix-profile/lib:/usr/lib/x86_64-linux-gnu"

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "mkdir -p ~/.local/share/fonts",
  "cp fonts/*.ttf ~/.local/share/fonts/ || true",
  "fc-cache -f -v",
  "soffice --headless --terminate_after_init --env:UserInstallation=file:///tmp/lo_profile_warmup || true"
]