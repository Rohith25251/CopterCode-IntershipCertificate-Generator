[phases.setup]
nixPkgs = [
  "python3",
  "gcc",
  "libreoffice",
  "jre",
  "fontconfig",
  "pango",
  "cairo",
  "gobject-introspection",
  "libffi",
  "glib"
]

[variables]
LD_LIBRARY_PATH = "/root/.nix-profile/lib"

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "mkdir -p ~/.local/share/fonts",
  "cp fonts/*.ttf ~/.local/share/fonts/ || true",
  "fc-cache -f -v"
]
